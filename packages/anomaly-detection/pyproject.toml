[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kynode-pediatric-anomaly-detection"
version = "0.1.0a0"
description = "Transparent rolling-baseline anomaly flags for pediatric climate-health signals."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "KYNODE" }]

[tool.setuptools]
package-dir = { "" = "src" }

[tool.setuptools.packages.find]
where = ["src"]
